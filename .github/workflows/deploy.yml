name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run linter
        run: |
          pip install flake8
          flake8 . --max-line-length=100 --exclude=__pycache__,.venv,venv
      
      - name: Run tests
        if: exists('tests/')
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --cov=. --cov-report=xml

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 22
          script: |
            cd /home/analytics/app
            
            git fetch origin main
            git reset --hard origin/main
            
            pip install -r requirements.txt --break-system-packages
            
            sudo systemctl restart analytics-dash
            sleep 5
            
            sudo systemctl status analytics-dash --no-pager || true
            
            echo "✅ Deploy finalizado com sucesso!"
      
      - name: Comment on commit
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commit } = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });
            
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '✅ **Deploy concluído com sucesso!**\n\nO código foi enviado para o servidor de produção.'
            });
      
      - name: Comment on commit failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commit } = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });
            
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '❌ **Falha no deploy**\n\nVerifique os logs do GitHub Actions para mais detalhes.'
            });
